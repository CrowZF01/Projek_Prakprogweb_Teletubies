<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donasi</title>
    <link rel="stylesheet" href="styles/styleHalDonate.css">
</head>
<body>
    
    <header>
        <nav class="logo"> 
            <a href="halUtama.html">
                <img src="img/T.png" alt="Klik gambar ini" />
            </a>
        </nav>
    </header>

    <main> 
        <a href="halDetail2.html" class="back">&larr; Kembali ke Detail</a>
        <section class="donate">
            <h1>Formulir Donasi</h1>
            <p class="campaign-summary">Anda akan mendonasikan untuk <strong>Bantu Anak Yatim Piatu</strong> oleh Budi.</p>
            <form>
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" required>
                <br>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <br>

                <label for="amount">Nominal Donasi</label>
                <input type="number" id="amount" name="amount" min="1" required>
                <br>

                <label for="method">Metode Pembayaran</label>
                <select id="method" name="method">
                    <option value="bank">Transfer Bank</option>
                    <option value="e-wallet">E-Wallet</option>
                </select>
                <br>

                <label for="message">Pesan Dukungan (opsional)</label>
                <textarea id="message" name="message"></textarea>
                <br>

                <label for="proof">Bukti Transfer (PDF/JPG/PNG)</label>
                <input type="file" id="proof" name="proof" accept=".pdf,.jpg,.png">
                <br>

                <button class="btn" type="submit">Kirim Donasi</button>
            </form>
        </section>
    </main> 

    <footer>

    </footer>
    
</body>
</html>
